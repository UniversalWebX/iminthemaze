<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Maze Game</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="mode-selection">
    <button id="editor-btn">Editor Mode</button>
    <button id="singleplayer-btn">Singleplayer</button>
    <button id="multiplayer-host-btn">Host Multiplayer</button>
    <button id="multiplayer-join-btn">Join Multiplayer</button>
  </div>
  <div id="editor" style="display:none;">
    <canvas id="editor-canvas"></canvas>
    <div id="tools">
      <button data-tool="wall">Wall</button>
      <button data-tool="portal">Portal</button>
      <button data-tool="door">Door</button>
      <button data-tool="key">Key</button>
      <button data-tool="spike">Spike</button>
      <button data-tool="trigger-person">Person Trigger</button>
      <button data-tool="trigger-wave">Wave Trigger</button>
      <button data-tool="trigger-gravity">Gravity Trigger</button>
      <button data-tool="trigger-zipline">Zipline Trigger</button>
      <button data-tool="start">Start Point</button>
      <button data-tool="end">End Point</button>
      <button data-tool="draw">Draw</button>
      <button data-tool="rescale">Rescale</button>
      <button data-tool="rotate">Rotate</button>
      <button id="resize-maze">Resize Maze</button>
      <button id="ai-build">Ask AI to Build Maze</button>
      <button id="save-maze">Save Maze</button>
      <button id="load-maze">Load Maze</button>
    </div>
    <input id="ai-prompt" placeholder="Describe maze for AI">
  </div>
  <div id="play" style="display:none;">
    <canvas id="play-canvas"></canvas>
    <div id="multiplayer-info" style="display:none;">
      <input id="room-id" placeholder="Room ID">
      <button id="join-room">Join</button>
    </div>
  </div>
  <script src="/socket.io/socket.io.js"></script>
  <script src="game.js"></script>
</body>
</html>
