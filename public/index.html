<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Futuristic Maze Game</title>
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>
  <div id="mode-selection">
    <button id="editor-btn">Editor Mode</button>
    <button id="singleplayer-btn">Singleplayer</button>
    <button id="multiplayer-host-btn">Host Multiplayer</button>
    <button id="multiplayer-join-btn">Join Multiplayer</button>
  </div>

  <div id="editor" style="display:none;">
    <canvas id="editor-canvas"></canvas>
    <div id="tools">
      <button data-tool="wall">Wall</button>
      <button data-tool="portal">Portal</button>
      <button data-tool="door">Door</button>
      <button data-tool="key">Key</button>
      <button data-tool="spike">Spike</button>
      <button data-tool="trigger-zipline">Zipline</button>
      <button data-tool="start">Start</button>
      <button data-tool="end">End</button>
      <button data-tool="draw">Draw</button>
      <button data-tool="erase">Erase</button>
      <button data-tool="select">Select</button>
      <button data-tool="rescale">Rescale</button>
      <button data-tool="rotate">Rotate</button>

      <div style="margin: 10px 0; padding: 8px; background: rgba(0,255,204,0.08); border-radius: 6px;">
        <label>Color: </label>
        <input type="color" id="tool-color" value="#00ffcc">
        <button id="apply-color">Apply to Tool</button>
      </div>

      <button id="resize-maze">Resize Maze</button>
      <button id="ai-build">Ask AI to Build Maze</button>
      <button id="save-maze">Save Maze (JSON)</button>
      <button id="load-maze">Load from LocalStorage</button>
    </div>
    <input id="ai-prompt" placeholder="Describe maze for AI (e.g., futuristic sci-fi labyrinth)">
  </div>

  <div id="play" style="display:none;">
    <canvas id="play-canvas"></canvas>
    <div id="load-container" style="text-align:center; margin:20px; color:#00ffcc; font-family:'Orbitron',sans-serif;">
      <h3 style="margin-bottom:10px;">Load Maze from Code</h3>
      <textarea id="load-json" placeholder="Paste the JSON code from the Python editor or Save Maze here..." rows="8" style="width:90%; max-width:800px; background:rgba(0,0,0,0.6); border:1px solid #00ffcc; color:#00ffcc; padding:12px; font-family:monospace; border-radius:6px;"></textarea><br><br>
      <button id="load-from-code" style="padding:12px 30px; font-size:16px;">Load Pasted JSON</button>
    </div>
    <div id="multiplayer-info" style="display:none; text-align:center; margin:20px;">
      <input id="room-id" placeholder="Room ID" style="padding:10px; width:200px;">
      <button id="join-room" style="padding:10px 20px;">Join</button>
    </div>
  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script src="game.js"></script>
</body>
</html>
