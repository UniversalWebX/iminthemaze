<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Maze Studio Arcade</title>
    <script src="/socket.io/socket.io.js"></script>
    <style>
        :root {
            --accent: #007acc;
            --bg: #0a0a0a;
            --panel: #161616;
            --border: #2a2a2a;
        }
        body {
            background: var(--bg);
            color: #fff;
            font-family: 'Segoe UI', sans-serif;
            margin: 0;
            overflow: hidden;
        }
        .nav {
            display: flex;
            background: #000;
            padding: 10px 20px;
            border-bottom: 1px solid var(--border);
            gap: 20px;
            align-items: center;
        }
        .tab {
            padding: 8px 16px;
            background: none;
            border: none;
            color: #555;
            cursor: pointer;
            font-weight: bold;
            border-radius: 4px;
        }
        .tab.active {
            color: var(--accent);
            background: #111;
        }
        .view {
            display: none;
            height: calc(100vh - 55px);
        }
        .view.active {
            display: flex;
        }
        .sidebar {
            width: 300px;
            background: var(--panel);
            border-right: 1px solid var(--border);
            padding: 20px;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .canvas-area {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #000;
            position: relative;
        }
        canvas {
            background: #000;
            border: 1px solid var(--border);
            box-shadow: 0 0 50px rgba(0,0,0,0.8);
        }
        .btn {
            padding: 10px;
            border-radius: 6px;
            border: 1px solid var(--border);
            background: #222;
            color: #fff;
            cursor: pointer;
            font-size: 12px;
        }
        .btn.active {
            background: var(--accent);
            border-color: var(--accent);
        }
        .btn-main {
            background: var(--accent);
            border: none;
            font-weight: bold;
            padding: 12px;
        }
        #play-ui {
            position: absolute;
            z-index: 50;
            background: rgba(20,20,20,0.95);
            padding: 40px;
            border-radius: 15px;
            border: 1px solid var(--border);
            width: 320px;
        }
        input, textarea {
            width: 100%;
            background: #000;
            border: 1px solid var(--border);
            color: #fff;
            padding: 10px;
            border-radius: 6px;
            box-sizing: border-box;
        }
    </style>
</head>
<body>

    <div class="nav">
        <div style="font-weight: 900; color: var(--accent)">ARCADE_ENGINE</div>
        <button class="tab active" onclick="tab('play')">PLAY</button>
        <button class="tab" onclick="tab('edit')">BUILDER</button>
    </div>

    <div id="view-play" class="view active">
        <div id="play-ui">
            <input id="username" placeholder="Player Name">
            <input id="roomName" placeholder="Room Title">
            <textarea id="mazeInput" style="height: 60px" placeholder="Paste JSON Code... (optional)"></textarea>
            <button class="btn btn-main" onclick="hostMaze()" style="width:100%">CREATE SERVER</button>
            <div id="roomList" style="margin-top: 15px"></div>
        </div>
        <div class="canvas-area">
            <canvas id="gameCanvas"></canvas>
        </div>
    </div>

    <div id="view-edit" class="view">
        <div class="sidebar">
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 5px;">
                <button class="btn active" onclick="setTool('select', this)">SELECT</button>
                <button class="btn" onclick="setTool('draw', this)">DRAW</button>
                <button class="btn" onclick="setTool('delete', this)">DELETE</button>
                <button class="btn" onclick="setTool('rot', this)">ROTATE</button>
            </div>
            <div style="display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 5px; margin-top: 10px;">
                <button class="btn" onclick="setTool('wall', this)">WALL</button>
                <button class="btn" onclick="setTool('door', this)">DOOR</button>
                <button class="btn" onclick="setTool('key', this)">KEY</button>
                <button class="btn" onclick="setTool('portal', this)">PORTAL</button>
                <button class="btn" onclick="setTool('start', this)">START</button>
                <button class="btn" onclick="setTool('end', this)">END</button>
            </div>
            <textarea id="aiPrompt" placeholder="Describe the maze you want..."></textarea>
            <button class="btn btn-main" onclick="askAI()">AI GENERATE</button>
            <button class="btn" onclick="copyCode()" style="margin-top: auto">COPY JSON</button>
        </div>
        <div class="canvas-area">
            <canvas id="editorCanvas"></canvas>
        </div>
    </div>

    <script src="game.js"></script>
</body>
</html>
